version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: testify-db-local
    environment:
      POSTGRES_DB: testify
      POSTGRES_USER: testify_user
      POSTGRES_PASSWORD: testify_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testify_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  testify-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testify-app-local
    ports:
      - "8080:8080"
    environment:
      # Activate the 'docker' profile to load application-docker.properties
      SPRING_PROFILES_ACTIVE: docker
      # Provide the JWT secret for the application
      JWT_SECRET: "a-secure-secret-for-local-development"
      # Pass database credentials to the application, matching application-docker.properties
      DB_USERNAME: "testify_user"
      DB_PASSWORD: "testify_password"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
