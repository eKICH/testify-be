# ==========================================
# Default / local development configuration
# ==========================================
# This file is loaded for ALL profiles, including local runs where no
# spring.profiles.active is set (e.g. `mvn spring-boot:run`).
# The `render` profile (application-render.properties) overrides these
# values in production and is only active when SPRING_PROFILES_ACTIVE=render
# is set on the deployment platform.

spring.application.name=testify
server.port=${PORT:8080}

# ------------------------------------------
# Database - defaults to local Postgres.
# Override with env vars, or point at your own local instance.
# ------------------------------------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/testify}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Let Hibernate manage the schema locally so a fresh clone works out of the box.
# (Production uses ddl-auto=none via the render profile - migrations should be
# applied deliberately there, not auto-generated.)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ------------------------------------------
# JWT Configuration
# ------------------------------------------
# Dev-only fallback secret so the app boots without extra setup. Overridden by
# the JWT_SECRET env var - always set a strong, unique JWT_SECRET in production.
app.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-please-this-is-not-secure-32bytes}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ------------------------------------------
# API Documentation (Swagger/OpenAPI)
# ------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ------------------------------------------
# Actuator
# ------------------------------------------
management.endpoints.web.exposure.include=health,info
