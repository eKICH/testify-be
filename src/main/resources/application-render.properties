# Server Configuration
server.port=${PORT:8080}

# Database Configuration (Render PostgreSQL)
# Construct the full JDBC URL from the Render environment variable and require SSL.
spring.datasource.url=jdbc:${SPRING_DATASOURCE_URL}?sslmode=require
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Explicitly set the dialect for robust production deployments.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'update' for the first deployment to create the schema automatically.
# Can be changed back to 'validate' later for safety.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging Configuration
logging.level.root=WARN
logging.level.com.testify=INFO

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
