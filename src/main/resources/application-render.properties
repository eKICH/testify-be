# Application Properties for Render + Supabase
# Place this file at: src/main/resources/application-render.properties

# ==========================================
# Server Configuration
# ==========================================
server.port=${PORT:8080}
server.shutdown=graceful
server.servlet.context-path=/testify
server.compression.enabled=true
server.compression.min-response-size=1024
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5

# ==========================================
# Database Configuration (Supabase PostgreSQL)
# ==========================================
# Supabase provides: postgresql://user:password@host:port/database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# Connection Pool Configuration (HikariCP)
# Important: Supabase free tier has limited connections
# Keep pool size small on free tier
# ==========================================
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.auto-commit=true

# ==========================================
# JPA/Hibernate Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Hibernate Performance Tuning
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==========================================
# JWT Configuration
# ==========================================
# Set JWT_SECRET via Render environment variables
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ==========================================
# API Documentation (Swagger/OpenAPI)
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ==========================================
# Actuator Configuration (Health Checks)
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ==========================================
# Logging Configuration
# ==========================================
logging.level.root=WARN
logging.level.com.testify=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.postgresql=WARN

logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ==========================================
# Jackson Configuration (JSON Serialization)
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ==========================================
# Spring Configuration
# ==========================================
spring.application.name=testify
spring.lifecycle.timeout-per-shutdown-phase=30s

# ==========================================
# Caching (Optional - for optimization)
# ==========================================
# Uncomment to enable caching when needed
# spring.cache.type=simple

# ==========================================
# Internationalization
# ==========================================
spring.messages.encoding=UTF-8
spring.messages.basename=messages

# ==========================================
# Render-specific Configuration
# ==========================================
# Render uses PORT environment variable
# Server will listen on the port specified
server.http2.enabled=true

# ==========================================
# Development Helpers (Comment out in production)
# ==========================================
# Uncomment only for debugging:
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true
# logging.level.org.springframework.security=DEBUG
# logging.level.org.hibernate.SQL=DEBUG